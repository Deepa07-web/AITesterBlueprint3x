name: Selenium Advance Framework CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run automation suite (headless Chrome, qa env)
        working-directory: Chap-2 Prompt Eng/Project2/Selenium_Advance_Framework
        run: mvn -B test -Dbrowser=chrome -Denv=qa -Dheadless=true

      - name: Upload Extent report and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-reports
          path: |
            Chap-2 Prompt Eng/Project2/Selenium_Advance_Framework/reports/**
            Chap-2 Prompt Eng/Project2/Selenium_Advance_Framework/test-output/**
