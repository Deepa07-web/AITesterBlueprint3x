# QA environment config.
# base.url is the only URL stated in the PRD (app.vwo.com). This framework treats qa as
# pointing at the same public app pending a real QA endpoint - update if a dedicated QA
# host exists.
base.url=https://app.vwo.com
browser=chrome
headless=false
implicit.wait.seconds=5
explicit.wait.seconds=20
page.load.timeout.seconds=30
retry.max.count=2
screenshot.dir=reports/screenshots

# PRD does not provide real test credentials - Insufficient information to determine.
# PLACEHOLDER values only; override with -Dtest.valid.email=... -Dtest.valid.password=...
# or a real test account before running against a live environment.
test.valid.email=PLACEHOLDER_VALID_EMAIL@example.com
test.valid.password=PLACEHOLDER_VALID_PASSWORD
